# Create a GitHub Actions workflow to build a .NET project when a pull request is opened on the develop branch.
name: Build .net project on pull request to develop

on: 
    pull_request:
        branches:
            - develop

jobs: 
    build-my-project:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                dotnet-version: '10.0.x'

            - name: Restore dependencies
              run: dotnet restore

            - name: Build project
              run: dotnet build --configuration Release --no-restore
    